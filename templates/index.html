<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Agent</title>
    <meta name="description" content="My Agent Chat" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>My Agent</h1>
        <div style="display: flex; gap: 8px; align-items: center">
          <button id="clear-btn" onclick="clearHistory()">Clear</button>
          <a
            href="/settings"
            class="nav-link"
            style="
              padding: 6px 12px;
              border: 1px solid #ddd;
              border-radius: 8px;
            "
            >⚙️ Settings</a
          >
        </div>
      </div>

      <div class="approval-banner hidden" id="approval-banner">
        <span id="approval-banner-text"></span>
        <a href="/settings">Review</a>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input
          type="text"
          id="input"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const approvalBanner = document.getElementById("approval-banner");
      const approvalBannerText = document.getElementById("approval-banner-text");

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      function addMessage(role, text) {
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.innerText = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        addMessage("user", text);

        const bubble = document.createElement("div");
        bubble.className = "message agent";
        bubble.innerText = "Thinking...";
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;

        let started = false;
        const es = new EventSource(
          "/chat/stream?message=" + encodeURIComponent(text),
        );

        es.onmessage = (e) => {
          const { type, data } = JSON.parse(e.data);
          if (type === "text") {
            if (!started) {
              bubble.innerText = "";
              started = true;
            }
            bubble.innerText += data;
            messages.scrollTop = messages.scrollHeight;
          } else if (type === "tool") {
            bubble.innerText = data;
            started = false;
          } else if (type === "error") {
            bubble.innerText = data || "Request failed, please try again.";
            started = true;
          } else if (type === "done") {
            es.close();
          }
        };

        es.onerror = () => {
          es.close();
          if (!started) bubble.innerText = "Request failed, please try again.";
        };
      }

      // Poll for due reminders every 30 seconds
      setInterval(async () => {
        const res = await fetch("/reminders/poll");
        const data = await res.json();
        for (const msg of data.reminders) {
          addMessage("agent", "⏰ Reminder: " + msg);
        }
      }, 30000);

      async function refreshApprovalsBanner() {
        const res = await fetch("/api/approvals?status=pending");
        const data = await res.json();
        const count = data.approvals ? data.approvals.length : 0;
        if (count > 0) {
          approvalBanner.classList.remove("hidden");
          approvalBannerText.innerText = `${count} tool approval${count === 1 ? "" : "s"} waiting`;
        } else {
          approvalBanner.classList.add("hidden");
          approvalBannerText.innerText = "";
        }
      }

      setInterval(refreshApprovalsBanner, 5000);
      refreshApprovalsBanner();

      async function clearHistory() {
        await fetch("/clear", { method: "POST" });
        messages.innerHTML = "";
        addMessage("agent", "Conversation cleared.");
      }
    </script>
  </body>
</html>
