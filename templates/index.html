<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Agent</title>
    <meta name="description" content="My Agent Chat">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Agent</h1>
            <div style="display:flex;gap:8px;align-items:center;">
                <button id="clear-btn" onclick="clearHistory()">Clear</button>
                <a href="/settings" class="nav-link" style="padding:6px 12px;border:1px solid #ddd;border-radius:8px;">⚙️ Settings</a>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("input");
        const messages = document.getElementById("messages");

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        function addMessage(role, text) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerText = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            input.value = "";
            addMessage("user", text);

            const thinking = document.createElement("div");
            thinking.className = "message agent thinking";
            thinking.innerText = "Thinking...";
            messages.appendChild(thinking);
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                thinking.remove();
                addMessage("agent", data.reply || "(no reply)");
            } catch (e) {
                thinking.remove();
                addMessage("agent", "Request failed, please try again.");
            }
        }

        async function clearHistory() {
            await fetch("/clear", {method: "POST"});
            messages.innerHTML = "";
            addMessage("agent", "Conversation cleared.");
        }
    </script>
</body>
</html>
