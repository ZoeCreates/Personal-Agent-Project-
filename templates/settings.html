<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - My Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Settings</h1>
            <a href="/" class="nav-link">← Back to Chat</a>
        </div>

        <div class="settings-body">

            <div class="section">
                <h2>GitHub</h2>
                <div class="field">
                    <label>Username</label>
                    <div class="field-row">
                        <input type="text" id="github-username" placeholder="e.g. ZoeCreates" />
                        <button onclick="saveSettings()">Save</button>
                    </div>
                    <p class="hint" id="save-status"></p>
                </div>
            </div>

            <div class="section">
                <h2>Connected Tools</h2>
                <div class="subsection">
                    <h3>Built-in</h3>
                    <ul id="builtin-tools" class="tool-list"></ul>
                </div>
                <div class="subsection">
                    <h3>MCP</h3>
                    <ul id="mcp-tools" class="tool-list"></ul>
                </div>
            </div>

            <div class="section">
                <div class="section-title-row">
                    <h2>Workspace Permissions</h2>
                    <span class="status-pill" id="mcp-restriction">Loading</span>
                </div>
                <div class="permission-grid">
                    <div class="permission-item">
                        <h3>Workspace root</h3>
                        <code id="workspace-root" class="code-value">Loading...</code>
                    </div>
                    <div class="permission-item">
                        <h3>MCP filesystem root</h3>
                        <code id="mcp-filesystem-root" class="code-value">Loading...</code>
                    </div>
                </div>

                <div class="subsection">
                    <h3>Read roots</h3>
                    <ul id="read-roots" class="path-list"></ul>
                </div>
                <div class="subsection">
                    <h3>Write roots</h3>
                    <ul id="write-roots" class="path-list"></ul>
                </div>
                <div class="subsection">
                    <h3>Restricted paths</h3>
                    <ul id="restricted-paths" class="path-list"></ul>
                </div>
            </div>

            <div class="section">
                <h2>Conversation</h2>
                <button class="danger-btn" onclick="clearHistory()">Clear History</button>
                <p class="hint" id="clear-status"></p>
            </div>

        </div>
    </div>

    <script>
        async function loadTools() {
            const res = await fetch("/api/tools");
            const data = await res.json();

            const builtinList = document.getElementById("builtin-tools");
            data.builtin.forEach(name => {
                const li = document.createElement("li");
                li.innerText = name;
                builtinList.appendChild(li);
            });

            const mcpList = document.getElementById("mcp-tools");
            data.mcp.forEach(name => {
                const li = document.createElement("li");
                li.innerText = name;
                mcpList.appendChild(li);
            });
        }

        function renderPathList(id, values) {
            const list = document.getElementById(id);
            list.innerHTML = "";
            if (!values || values.length === 0) {
                const li = document.createElement("li");
                li.className = "empty-state";
                li.innerText = "None";
                list.appendChild(li);
                return;
            }
            values.forEach(value => {
                const li = document.createElement("li");
                const code = document.createElement("code");
                code.innerText = value;
                li.appendChild(code);
                list.appendChild(li);
            });
        }

        async function loadWorkspacePolicy() {
            const res = await fetch("/api/workspace-policy");
            const data = await res.json();

            document.getElementById("workspace-root").innerText = data.workspace_root;
            document.getElementById("mcp-filesystem-root").innerText = data.mcp_filesystem_root;
            const restriction = document.getElementById("mcp-restriction");
            restriction.innerText = data.restrict_mcp_to_workspace ? "MCP restricted" : "MCP expanded";
            restriction.className = data.restrict_mcp_to_workspace ? "status-pill" : "status-pill warning";

            renderPathList("read-roots", data.read_roots);
            renderPathList("write-roots", data.write_roots);
            renderPathList("restricted-paths", data.restricted_paths);
        }

        async function saveSettings() {
            const username = document.getElementById("github-username").value.trim();
            if (!username) return;
            const res = await fetch("/api/settings", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({github_username: username})
            });
            const data = await res.json();
            const status = document.getElementById("save-status");
            if (data.status === "ok") {
                status.innerText = "✓ Saved";
                status.style.color = "green";
            } else {
                status.innerText = "Failed to save";
                status.style.color = "red";
            }
        }

        async function clearHistory() {
            await fetch("/clear", {method: "POST"});
            const status = document.getElementById("clear-status");
            status.innerText = "✓ Cleared";
            status.style.color = "green";
        }

        loadTools();
        loadWorkspacePolicy();
    </script>
</body>
</html>
